runtime: "nodejs20"

# Secret mappings for production
# Public variables (NEXT_PUBLIC_*) should be added in the Firebase Console
env:
  - variable: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
  - variable: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL

# Build settings
scripts:
  build: "npm run build"
  start: "npm run start"
