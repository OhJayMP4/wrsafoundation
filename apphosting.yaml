runtime: "nodejs20"

# Environment variables mapping for production
env:
  - name: NEXT_PUBLIC_FIREBASE_API_KEY
    value: YOUR_API_KEY # Or populate via Firebase Console
  - name: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: YOUR_PROJECT_ID.firebaseapp.com
  - name: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: YOUR_PROJECT_ID
  - name: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: YOUR_PROJECT_ID.appspot.com
  - name: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: YOUR_SENDER_ID
  - name: NEXT_PUBLIC_FIREBASE_APP_ID
    value: YOUR_APP_ID
    
  # Secrets handled via Google Cloud Secret Manager
  - name: FIREBASE_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY
  - name: FIREBASE_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL

# Build settings
scripts:
  build: "npm run build"
  start: "npm run start"
